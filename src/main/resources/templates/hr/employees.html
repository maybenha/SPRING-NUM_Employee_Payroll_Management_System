<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List - Payroll System (HR)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            overflow-x: hidden;
        }
        .main-content {
            margin-left: 280px; /* Width of the sidebar */
            padding: 20px;
        }
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #343a40;
        }
        @media (max-width: 767.98px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 0;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}" class="sidebar"></div>

    <!-- Page Content -->
    <div class="main-content flex-grow-1">
        <h1 class="mb-4">Employee Management (HR)</h1>

        <div class="card mb-4">
            <div class="card-header">Employee List</div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Position</th>
                        <th>Basic Salary</th>
                        <th>Hire Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="employee : ${employees}">
                        <td th:text="${employee.id}">1</td>
                        <td th:text="${employee.fullName}">John Doe</td>
                        <td th:text="${employee.email}">john.doe@example.com</td>
                        <td th:text="${employee.department}">IT</td>
                        <td th:text="${employee.position}">Software Engineer</td>
                        <td th:text="${#numbers.formatCurrency(employee.basicSalary)}">$5000.00</td>
                        <td th:text="${#temporals.format(employee.hireDate, 'dd-MM-yyyy')}">01-01-2020</td>
                        <td>
                            <a th:href="@{/hr/employees/{id}/edit(id=${employee.id})}" class="btn btn-sm btn-info me-2">Edit</a>
                            <form th:action="@{/hr/payroll/calculate/{employeeProfileId}(employeeProfileId=${employee.id})}" method="post" style="display:inline-block;">
                                <input type="hidden" name="month" th:value="${#dates.day(T(java.time.LocalDate).now())}">
                                <input type="hidden" name="year" th:value="${#dates.year(T(java.time.LocalDate).now())}">
                                <button type="submit" class="btn btn-sm btn-success ms-2">Calculate Payroll</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
