<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee - Payroll System (HR)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4361ee;
            --primary-light: #4895ef;
            --secondary-color: #3f37c9;
            --dark-bg: #0e58f5;
            --dark-bg-light: #0e58f5;
            --text-light: #f8f9fa;
            --text-muted: #adb5bd;
            --border-color: #343a40;
            --hover-color: #2d3041;
            --active-color: #3a3f51;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --success-color: rgba(10, 161, 6, 0.51); /* Light blue/cyan for success */
            --danger-color: #f72585;
            --btn-info: #4895ef; /* Lighter primary shade for info/edit */
            --btn-success: rgba(6, 56, 133, 0.9); /* Standard green for Calculate */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fb;
            color: rgba(10, 161, 6, 0.98);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex; /* Use flexbox for layout */
        }

        /* --- Sidebar Styles (from your provided code) --- */
        .sidebar {
            background: linear-gradient(180deg, var(--dark-bg) 0%, var(--dark-bg-light) 100%);
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
            transition: var(--transition);
        }

        .sidebar-header { padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--border-color); }
        .brand { display: flex; align-items: center; color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 1.25rem; }
        .brand-icon { background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 10px; }
        .sidebar-nav { flex: 1; padding: 1rem 0; }
        .nav-section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 0 1.5rem; margin-bottom: 0.5rem; }
        .nav-link { display: flex; align-items: center; padding: 0.75rem 1.5rem; color: var(--text-light); text-decoration: none; transition: var(--transition); border-left: 3px solid transparent; }
        .nav-link:hover { background-color: var(--hover-color); border-left-color: var(--primary-light); }
        .nav-link.active { background-color: var(--active-color); border-left-color: var(--primary-color); }
        .nav-link i { margin-right: 12px; font-size: 1.1rem; width: 20px; text-align: center; }
        .nav-badge { margin-left: auto; background-color: var(--primary-color); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border-color); }
        .user-profile { display: flex; align-items: center; padding: 0.75rem; border-radius: 8px; transition: var(--transition); cursor: pointer; }
        .user-profile:hover { background-color: var(--hover-color); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid var(--primary-light); }
        .user-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; color: var(--text-light); }
        .user-role { font-size: 0.75rem; color: var(--text-muted); }

        /* --- Main Content Styles --- */
        .main-content {
            margin-left: 280px; /* Adjust to sidebar width */
            padding: 30px;
            transition: var(--transition);
            flex-grow: 1;
        }

        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-weight: 700;
            color: var(--dark-bg);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Card and Form Specific Styles */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .card-header {
            background-color: white;
            border-bottom: 1px solid #eaeaea;
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            color: var(--dark-bg);
            font-size: 1.1rem;
        }

        .form-label {
            font-weight: 500;
            color: #1a4c99;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid #ced4da;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.25);
            outline: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .btn-secondary {
            background-color: rgba(245, 11, 28, 0.81);

            padding: 0.75rem 1.5rem;

            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
            border-color: #545b62;
        }


        /* Responsive adjustments */
        @media (max-width: 991.98px) {
            .sidebar { width: 70px; }
            .brand-text, .nav-text, .user-info, .nav-section-title, .nav-badge { display: none; }
            .main-content { margin-left: 70px; padding: 15px; }
            .sidebar:hover { width: 280px; }
            .sidebar:hover .brand-text, .sidebar:hover .nav-text, .sidebar:hover .user-info, .sidebar:hover .nav-section-title, .sidebar:hover .nav-badge { display: block; }
        }
        @media (max-width: 767.98px) {
            .sidebar { width: 100%; height: auto; position: relative; margin-bottom: 10px; }
            .main-content { margin-left: 0; padding: 10px; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .page-header a { margin-top: 1rem; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <a href="/" class="brand">
            <div class="brand-icon"><i class="bi bi-cash-coin"></i></div>
            <span class="brand-text">Payroll System</span>
        </a>
    </div>
    <div class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <ul class="nav-list">
                <li class="nav-item">
                    <a th:href="@{/hr/dashboard}" class="nav-link">
                        <i class="bi bi-house"></i><span class="nav-text">Dashboard</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Management</div>
            <ul class="nav-list">
                <li class="nav-item">
                    <a th:href="@{/employees}" class="nav-link active">
                        <i class="bi bi-people"></i><span class="nav-text">Employees</span>
                        <span class="nav-badge" sec:authorize="hasRole('ADMIN')">Admin</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <div class="sidebar-footer">
        <div class="dropdown">
            <div class="user-profile" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="/images/num.png" alt="User Avatar" class="user-avatar">
                <div class="user-info">
                    <div class="user-name" sec:authentication="name">HR/Admin User</div>
                    <div class="user-role" sec:authentication="principal.authorities">Role</div>
                </div>
                <i class="bi bi-chevron-down text-light"></i>
            </div>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
                <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i>Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right me-2"></i>Sign out</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- Page Content -->
<div class="main-content flex-grow-1">
    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Employee Profile</h1>
            <p class="page-subtitle">Update details for <span th:text="${employee.fullName}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-person-fill me-1"></i>
            Employee Details
        </div>
        <div class="card-body">
            <form th:action="@{/hr/employees/{id}/edit(id=${employee.id})}" th:object="${employee}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" class="form-control" id="department" th:field="*{department}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="position" class="form-label">Position</label>
                        <input type="text" class="form-control" id="position" th:field="*{position}">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="basicSalary" class="form-label">Basic Salary</label>
                    <input type="number" step="0.01" class="form-control" id="basicSalary" th:field="*{basicSalary}" required>
                </div>

                <div class="d-flex justify-content-start mt-4">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-save me-1"></i> Update Employee
                    </button>
                    <a th:href="@{/hr/employees}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Set active class dynamically for the current page
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            // Check if the link's href matches the current path exactly or is a parent path
            const linkHref = link.getAttribute('href');
            if (currentPath.startsWith(linkHref) && linkHref !== '/') { // Exclude '/' for exact match on sub-pages
                link.classList.add('active');
            } else if (currentPath === linkHref) { // Exact match for homepage or other exact routes
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    });
</script>

</body>
</html>
