<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee - Payroll System (HR)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #1a4c99;
            --primary-light: #4895ef;
            --secondary-color: #1a4c99;
            --dark-bg: #1a4c99;
            --dark-bg-light: #1a4c99;
            --text-light: #f8f9fa;
            --text-muted: #ffffff;
            --border-color: rgba(6, 56, 133, 0.9);
            --hover-color: #0e58f5;
            --active-color: #1a4c99;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --success-color: rgba(10, 161, 6, 0.51);
            --danger-color: #f72585;
            --btn-info: #4895ef;
            --btn-success: rgba(6, 56, 133, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fb;
            color: #ffffff; /* Changed from green to dark for readability */
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            background: linear-gradient(180deg, var(--dark-bg) 0%, var(--dark-bg-light) 100%);
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
        }

        .nav-section {
            margin-bottom: 1.5rem;
        }

        .nav-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 0 1.5rem;
            margin-bottom: 0.5rem;
        }

        .nav-item {
            list-style: none;
            margin-bottom: 0.25rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            color: var(--text-light);
            text-decoration: none;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background-color: var(--hover-color);
            border-left-color: var(--primary-light);
        }

        .nav-link.active {
            background-color: var(--active-color);
            border-left-color: var(--primary-color);
        }

        .nav-link i {
            margin-right: 12px;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .nav-badge {
            margin-left: auto;
            background-color: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .user-profile {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-radius: 8px;
            transition: var(--transition);
            cursor: pointer;
        }

        .user-profile:hover {
            background-color: var(--hover-color);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 2px solid var(--primary-light);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2px;
            color: var(--text-light);
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .dropdown-menu {
            background-color: var(--dark-bg-light);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .dropdown-item {
            color: var(--text-light);
            padding: 0.5rem 1rem;
        }

        .dropdown-item:hover {
            background-color: var(--hover-color);
            color: var(--text-light);
        }

        .dropdown-divider {
            border-color: var(--border-color);
        }

        /* --- Main Content --- */
        .main-content { margin-left: 280px; padding: 30px; transition: var(--transition); flex-grow: 1; }
        .page-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #eaeaea; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-weight: 700; color: var(--dark-bg); margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* Card and Form */
        .card { border: none; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 1.5rem; overflow: hidden; background: white; }
        .card-header { background-color: white; border-bottom: 1px solid #eaeaea; padding: 1.25rem 1.5rem; font-weight: 600; color: var(--dark-bg); font-size: 1.1rem; }
        .form-label { font-weight: 500; color: #1a4c99; margin-bottom: 0.5rem; }
        .form-control { border-radius: 8px; padding: 0.75rem 1rem; border: 1px solid #ced4da; }

        /* --- New Image Styles --- */
        .profile-upload-container {
            position: relative;
            width: 150px;
            margin: 0 auto 1.5rem;
        }
        .profile-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: var(--shadow);
        }
        .upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--primary-color);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid white;
            transition: var(--transition);
        }
        .upload-btn:hover { background: var(--secondary-color); transform: scale(1.1); }

        .btn-primary { background-color: var(--primary-color); border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; }
        .btn-secondary { background-color: rgba(245, 11, 28, 0.81); border: none; padding: 0.75rem 1.5rem; font-weight: 600; color: white;}

        @media (max-width: 991.98px) {
            .sidebar { width: 70px; }
            .brand-text, .nav-text, .user-info, .nav-section-title, .nav-badge { display: none; }
            .main-content { margin-left: 70px; }
            .sidebar:hover { width: 280px; }
            .sidebar:hover .brand-text, .sidebar:hover .nav-text, .sidebar:hover .user-info, .sidebar:hover .nav-section-title, .sidebar:hover .nav-badge { display: block; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <a href="/" class="brand">
            <div class="brand-icon"><i class="bi bi-cash-coin"></i></div>
            <span class="brand-text">Payroll System</span>
        </a>
    </div>
    <div class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <ul class="nav-list">
                <li class="nav-item">
                    <a th:href="@{/dashboard}" class="nav-link">
                        <i class="bi bi-house"></i><span class="nav-text">Dashboard</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Management</div>
            <ul class="nav-list">
                <li class="nav-item">
                    <a th:href="@{/admin/employees}" class="nav-link active">
                        <i class="bi bi-people"></i><span class="nav-text">Employees</span>
                        <span class="nav-badge" sec:authorize="hasRole('ADMIN')">Admin</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <div class="sidebar-footer">
        <div class="dropdown">
            <div class="user-profile" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="/images/num.png" alt="User Avatar" class="user-avatar">
                <div class="user-info">
                    <div style="color: white" class="user-name" sec:authentication="name">Admin User</div>
                    <div class="user-role" sec:authorize="hasRole('ADMIN')">Administrator</div>
                </div>
                <i class="bi bi-chevron-down"></i>
            </div>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
                <!--                    <li><a class="dropdown-item" th:href="@{/employee/profile}"><i class="bi bi-person me-2"></i>Profile</a></li>-->
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right me-2"></i>Sign out</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>

<div class="main-content flex-grow-1">
    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Employee Profile</h1>
            <p class="page-subtitle">Update details for <span th:text="${employee.fullName}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-person-fill me-1"></i>
            Employee Details
        </div>
        <div class="card-body">
            <!-- IMPORTANT: added enctype="multipart/form-data" -->
            <form th:action="@{/hr/employees/{id}/edit(id=${employee.id})}" th:object="${employee}" method="post" enctype="multipart/form-data">

                <!-- Profile Image Edit Section -->
                <div class="profile-upload-container">
                    <img id="imagePreview"
                         th:src="${employee.profileImageUrl != null ? employee.profileImageUrl : '/images/num.png'}"
                         class="profile-preview" alt="Employee Photo">
<!--                    <label for="imageFile" class="upload-btn">-->
<!--                        <i class="bi bi-camera"></i>-->
<!--                    </label>-->
                    <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display: none;" onchange="previewImage(this)">
                    <!-- Hidden field to keep existing URL if no new file is uploaded -->
                    <input type="hidden" th:field="*{profileImageUrl}">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="department" class="form-label">Department</label>
                        <select class="form-select" id="department" th:field="*{department}">
                            <option value="">-- Select Department --</option>
                            <option value="HR">HR</option>
                            <option value="IT">IT</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Operations">Operations</option>
                            <option value="Customer Support">Customer Support</option>
                            <option value="Administration">Administration</option>
                            <option value="Procurement">Procurement</option>
                            <option value="Research & Development">Research &amp; Development</option>
                        </select>
                    </div>


                    <div class="col-md-6 mb-3">
                        <label for="position" class="form-label">Position</label>
                        <input type="text" class="form-control" id="position" th:field="*{position}">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="basicSalary" class="form-label">Basic Salary</label>
                    <input type="number" step="0.01" class="form-control" id="basicSalary" th:field="*{basicSalary}" required>
                </div>

                <div class="d-flex justify-content-start mt-4">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-save me-1"></i> Update Employee
                    </button>
                    <a th:href="@{/hr/employees}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Preview image before upload
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Sidebar active class logic
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            const linkHref = link.getAttribute('href');
            if (currentPath.startsWith(linkHref) && linkHref !== '/') {
                link.classList.add('active');
            } else if (currentPath === linkHref) {
                link.classList.add('active');
            }
        });
    });
</script>

</body>
</html>
