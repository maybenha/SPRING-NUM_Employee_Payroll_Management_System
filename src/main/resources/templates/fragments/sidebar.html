<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: rgba(6, 56, 133, 0.9);
            --primary-light: #4895ef;
            --secondary-color: #0e58f5;
            --dark-bg: #1a4c99;
            --dark-bg-light: #1a4c99;
            --text-light: #ffffff;
            --text-muted: #adb5bd;
            --border-color: #1a4c99;
            --hover-color: #1a4c99;
            --active-color: #1a4c99;
            --shadow: 0 4px 6px rgb(26, 76, 153);
            --transition: all 0.3s ease;
            --success-color: #4cc9f0;
            --danger-color: rgba(245, 11, 28, 0.81);
            --warning-color: #f8961e;
            --info-color: #43aa8b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            color: var(--text-light);
        }

        .sidebar {
            background: linear-gradient(180deg, var(--dark-bg) 0%, var(--dark-bg-light) 100%);
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
        }

        .nav-section {
            margin-bottom: 1.5rem;
        }

        .nav-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 0 1.5rem;
            margin-bottom: 0.5rem;
        }

        .nav-item {
            list-style: none;
            margin-bottom: 0.25rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            color: var(--text-light);
            text-decoration: none;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background-color: var(--hover-color);
            border-left-color: var(--primary-light);
        }

        .nav-link.active {
            background-color: var(--active-color);
            border-left-color: var(--primary-color);
        }

        .nav-link i {
            margin-right: 12px;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .nav-badge {
            margin-left: auto;
            background-color: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .user-profile {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-radius: 8px;
            transition: var(--transition);
            cursor: pointer;
        }

        .user-profile:hover {
            background-color: var(--hover-color);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 2px solid var(--primary-light);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .dropdown-menu {
            background-color: var(--dark-bg-light);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .dropdown-item {
            color: var(--text-light);
            padding: 0.5rem 1rem;
        }

        .dropdown-item:hover {
            background-color: var(--hover-color);
            color: var(--text-light);
        }

        .dropdown-divider {
            border-color: var(--border-color);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                overflow: visible;
            }

            .brand-text, .nav-text, .user-info, .nav-section-title {
                display: none;
            }

            .brand-icon {
                margin-right: 0;
            }

            .nav-link {
                padding: 0.75rem;
                justify-content: center;
            }

            .nav-link i {
                margin-right: 0;
                font-size: 1.25rem;
            }

            .user-profile {
                padding: 0.5rem;
                justify-content: center;
            }

            .user-avatar {
                margin-right: 0;
            }

            .sidebar:hover {
                width: 280px;
            }

            .sidebar:hover .brand-text,
            .sidebar:hover .nav-text,
            .sidebar:hover .user-info,
            .sidebar:hover .nav-section-title {
                display: block;
            }

            .sidebar:hover .nav-link {
                justify-content: flex-start;
                padding: 0.75rem 1.5rem;
            }

            .sidebar:hover .nav-link i {
                margin-right: 12px;
            }

            .sidebar:hover .user-profile {
                justify-content: flex-start;
                padding: 0.75rem;
            }

            .sidebar:hover .user-avatar {
                margin-right: 12px;
            }
        }
    </style>
</head>
<body>

<div th:fragment="sidebar" class="sidebar">
    <!-- Header -->
    <div class="sidebar-header">
        <a href="/" class="brand">
            <div class="brand-icon">
                <i class="bi bi-cash-coin"></i>
            </div>
            <span class="brand-text">Payroll System</span>
        </a>
    </div>

    <!-- Navigation -->
    <div class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <ul class="nav-list">
                <li class="nav-item">
                    <a th:href="@{/dashboard}" class="nav-link active">
                        <i class="bi bi-house"></i>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Management</div>
            <ul class="nav-list">
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'HR')">
                    <a th:href="@{/employees}" class="nav-link">
                        <i class="bi bi-people"></i>
                        <span class="nav-text">Employees</span>
                        <span class="nav-badge" sec:authorize="hasRole('ADMIN')">Admin</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Employee</div>
            <ul class="nav-list">
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a th:href="@{/employee/attendance}" class="nav-link">
                        <i class="bi bi-calendar-check"></i>
                        <span class="nav-text">Attendance</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a th:href="@{/employee/payroll}" class="nav-link">
                        <i class="bi bi-cash"></i>
                        <span class="nav-text">My Payroll</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/employee/profile}" class="nav-link">
                        <i class="bi bi-person"></i>
                        <span class="nav-text">Profile</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Footer with User Profile -->
    <div class="sidebar-footer">
        <div class="dropdown">
            <div class="user-profile" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="/images/num.png" alt="User Avatar" class="user-avatar">
                <div style="color: white;" class="user-info">
                    <div class="user-name" sec:authentication="name">User Name</div>
                    <div class="user-role" sec:authorize="hasRole('ADMIN')">Administrator</div>
                    <div class="user-role" sec:authorize="hasRole('HR')">HR Manager</div>
                    <div class="user-role" sec:authorize="hasRole('EMPLOYEE')">Employee</div>
                </div>
                <i class="bi bi-chevron-down"></i>
            </div>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
<!--                <li><a class="dropdown-item" th:href="@{/employee/profile}"><i class="bi bi-person me-2"></i>Profile</a></li>-->
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item">
                            <i class="bi bi-box-arrow-right me-2"></i>Sign out
                        </button>
                    </form>
                </li>

            </ul>
        </div>
    </div>
</div>

<!-- Bootstrap JS (for dropdown functionality) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Add active class to current page
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        // Mobile sidebar toggle (if needed)
        const sidebar = document.querySelector('.sidebar');
        if (window.innerWidth <= 768) {
            sidebar.addEventListener('mouseenter', function() {
                this.style.width = '280px';
            });

            sidebar.addEventListener('mouseleave', function() {
                this.style.width = '70px';
            });
        }
    });
</script>

</body>
</html>
